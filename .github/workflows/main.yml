name: Titanic ML CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-store:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow project (re-train model)
        run: |
          mlflow run ./MLProject --entry-point main --env-manager local

      - name: Commit trained model artifact to repository
        run: |
          git config --local user.email "7463765+ardianyusuf@users.noreply.github.com"
          git config --local user.name "Ardian Yusuf"
          git add model.pkl
          git commit -m "chore: update trained model artifact [skip ci]" || echo "No changes to commit"
          git push
